<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本測試</title>
</head>
<body style="margin:0; padding:20px; background:#87CEEB; font-family:Arial;">
    
    <h1 style="color:#2E8B57; text-align:center;">🐝 基本測試</h1>
    
    <div style="background:#FFFF00; padding:20px; margin:20px 0; border:3px solid #FF0000; text-align:center;">
        <h2>如果你能看到這個黃色框框，說明 HTML 和 CSS 正常</h2>
    </div>
    
    <div style="background:#FFFFFF; padding:15px; margin:10px 0; border:2px solid #000000;">
        <p><strong>測試1:</strong> 白色背景框</p>
        <p><strong>測試2:</strong> 黑色邊框</p>
        <p><strong>測試3:</strong> 這些文字應該是黑色</p>
    </div>
    
    <div style="width:300px; height:200px; background:#00FF00; border:5px solid #0000FF; margin:20px auto;">
        <p style="color:#FFFFFF; text-align:center; padding:80px 0; margin:0; font-size:18px; font-weight:bold;">
            綠色區域<br>藍色邊框
        </p>
    </div>
    
    <canvas id="testCanvas" width="300" height="150" style="display:block; margin:20px auto; border:3px solid #FF00FF; background:#FFD700;">
        你的瀏覽器不支援 Canvas
    </canvas>
    
    <div style="text-align:center; margin:20px 0;">
        <button onclick="testCanvas()" style="background:#32CD32; color:white; border:none; padding:15px 30px; font-size:16px; border-radius:5px;">
            測試 Canvas 繪圖
        </button>
    </div>
    
    <div id="result" style="background:#F0F0F0; padding:15px; margin:20px 0; border:2px solid #808080; text-align:center;">
        <strong>測試結果會顯示在這裡</strong>
    </div>

    <script>
        console.log('JavaScript 開始執行');
        
        function testCanvas() {
            console.log('testCanvas 函數被調用');
            
            const canvas = document.getElementById('testCanvas');
            const result = document.getElementById('result');
            
            if (!canvas) {
                result.innerHTML = '❌ 找不到 Canvas 元素';
                return;
            }
            
            const ctx = canvas.getContext('2d');
            if (!ctx) {
                result.innerHTML = '❌ 無法取得 Canvas Context';
                return;
            }
            
            // 清除 Canvas
            ctx.clearRect(0, 0, 300, 150);
            
            // 繪製藍色矩形
            ctx.fillStyle = '#0000FF';
            ctx.fillRect(50, 25, 100, 50);
            
            // 繪製紅色圓形
            ctx.fillStyle = '#FF0000';
            ctx.beginPath();
            ctx.arc(200, 75, 30, 0, 2 * Math.PI);
            ctx.fill();
            
            // 繪製文字
            ctx.fillStyle = '#000000';
            ctx.font = '16px Arial';
            ctx.fillText('Canvas 測試成功!', 80, 120);
            
            result.innerHTML = '✅ Canvas 繪圖測試完成！如果你看到藍色矩形、紅色圓形和黑色文字，表示 Canvas 正常工作。';
            
            console.log('Canvas 測試完成');
        }
        
        // 頁面載入後自動執行測試
        window.addEventListener('load', function() {
            console.log('頁面載入完成');
            
            setTimeout(function() {
                console.log('自動執行 Canvas 測試');
                testCanvas();
            }, 1000);
        });
        
        console.log('JavaScript 腳本載入完成');
    </script>

</body>
</html>
