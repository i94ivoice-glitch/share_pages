<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐝 蜜蜂射擊大戰 - 音效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #87CEEB 0%, #98FB98 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            overflow: hidden;
        }
        
        .game-title {
            color: #2E8B57;
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-container {
            position: relative;
            border: 4px solid #228B22;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #87CEEB;
        }
        
        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%);
            touch-action: none;
            width: 400px;
            height: 600px;
        }
        
        .score-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 60px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            font-weight: bold;
            font-size: 1.2em;
            color: #2E8B57;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            pointer-events: none;
        }
        
        .audio-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 150;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .audio-btn {
            background: rgba(255,255,255,0.9);
            border: 2px solid #228B22;
            border-radius: 6px;
            padding: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .audio-btn:hover {
            background: #228B22;
            color: white;
            transform: scale(1.1);
        }
        
        .audio-btn.disabled {
            opacity: 0.5;
            background: rgba(255,255,255,0.5);
        }
        
        .start-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            z-index: 150;
            border: 3px solid #228B22;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            color: #2E8B57;
            font-size: 1.1em;
            font-weight: bold;
            max-width: 300px;
        }
        
        .audio-note {
            margin-top: 15px;
            font-size: 0.9em;
            color: #666;
            border-top: 1px solid #ddd;
            padding-top: 15px;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            border: 3px solid #228B22;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .game-over h2 {
            color: #DC143C;
            margin-bottom: 15px;
            font-size: 2em;
        }
        
        .game-over p {
            color: #2E8B57;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .btn {
            background: linear-gradient(145deg, #32CD32, #228B22);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #228B22, #32CD32);
        }
        
        .controls {
            margin-top: 15px;
            color: #2E8B57;
            text-align: center;
            font-size: 1.1em;
            max-width: 400px;
        }
        
        @media (max-width: 600px) {
            .game-title {
                font-size: 2em;
                margin: 10px 0;
            }
            
            .controls {
                font-size: 1em;
            }
            
            .audio-controls {
                right: 5px;
                top: 5px;
            }
            
            .score-panel {
                font-size: 1em;
                right: 50px;
            }
        }
    </style>
</head>
<body>
    <h1 class="game-title">🐝 蜜蜂射擊大戰 🎵</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="audio-controls">
            <div class="audio-btn" id="musicBtn" title="背景音樂">🎵</div>
            <div class="audio-btn" id="soundBtn" title="音效">🔊</div>
            <div class="audio-btn" id="vibrateBtn" title="震動">📳</div>
        </div>
        
        <div class="score-panel">
            <div>💯 <span id="score">0</span></div>
            <div>❤️ <span id="lives">3</span></div>
            <div>🎯 <span id="kills">0</span></div>
        </div>
        
        <div class="start-hint" id="startHint">
            🎮 觸摸螢幕開始遊戲<br>
            👆 滑動控制發射器移動<br>
            <div class="audio-note">
                🎵 包含背景音樂與音效<br>
                📳 支援震動回饋
            </div>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>🎮 遊戲結束！</h2>
            <p>最終分數: <span id="finalScore">0</span></p>
            <p>擊殺數: <span id="finalKills">0</span></p>
            <button class="btn" onclick="restartGame()">🚀 重新開始</button>
        </div>
    </div>
    
    <div class="controls">
        📱 滑動控制發射器 • 🎯 躲避蜜蜂炸彈 • 💥 反擊得分<br>
        🎵 音效版：背景音樂 + 射擊爆炸音效 + 增強震動
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 確保 canvas 可見性
        console.log('Canvas 元素:', canvas);
        console.log('Canvas 尺寸:', canvas.width, 'x', canvas.height);
        console.log('Context:', ctx);
        
        // 遊戲狀態
        let gameRunning = false;
        let gameStarted = false;
        let score = 0;
        let lives = 3;
        let kills = 0;
        let animationId;
        
        // 音效控制
        let musicEnabled = true;
        let soundEnabled = true;
        let vibrateEnabled = true;
        let audioContext = null;
        let backgroundMusic = null;
        
        // 遊戲物件
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            width: 40,
            height: 30,
            speed: 5
        };
        
        let bullets = [];
        let bees = [];
        let enemyBullets = [];
        let particles = [];
        
        // 觸控控制
        let touchX = null;
        let lastTouchX = null;
        let isTouch = false;
        
        // 遊戲計時
        let lastBeeSpawn = 0;
        let lastShot = 0;
        let gameTime = 0;
        
        // 音效系統初始化
        function initAudioSystem() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                setupAudioControls();
                createBackgroundMusic();
                console.log('音效系統初始化成功');
            } catch (error) {
                console.log('音效系統初始化失敗:', error);
            }
        }
        
        function setupAudioControls() {
            const musicBtn = document.getElementById('musicBtn');
            const soundBtn = document.getElementById('soundBtn');
            const vibrateBtn = document.getElementById('vibrateBtn');
            
            musicBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                musicEnabled = !musicEnabled;
                musicBtn.classList.toggle('disabled', !musicEnabled);
                if (musicEnabled && gameRunning) {
                    startBackgroundMusic();
                } else {
                    stopBackgroundMusic();
                }
            });
            
            soundBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                soundEnabled = !soundEnabled;
                soundBtn.classList.toggle('disabled', !soundEnabled);
                if (soundEnabled) {
                    playSound('confirm');
                }
            });
            
            vibrateBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                vibrateEnabled = !vibrateEnabled;
                vibrateBtn.classList.toggle('disabled', !vibrateEnabled);
                if (vibrateEnabled && navigator.vibrate) {
                    navigator.vibrate(50);
                }
            });
        }
        
        // 創建背景音樂
        function createBackgroundMusic() {
            if (!audioContext) return;
            
            const notes = [
                { freq: 523, duration: 0.5 }, // C5
                { freq: 659, duration: 0.5 }, // E5
                { freq: 784, duration: 0.5 }, // G5
                { freq: 659, duration: 0.5 }, // E5
                { freq: 523, duration: 0.5 }, // C5
                { freq: 440, duration: 0.5 }, // A4
                { freq: 523, duration: 1.0 }, // C5
                { freq: 0, duration: 0.5 }    // 休息
            ];
            
            let currentNoteIndex = 0;
            let nextNoteTime = 0;
            
            function scheduleNote() {
                if (!musicEnabled || !gameRunning) return;
                
                const note = notes[currentNoteIndex];
                const currentTime = audioContext.currentTime;
                
                if (currentTime >= nextNoteTime) {
                    if (note.freq > 0) {
                        playTone(note.freq, note.duration * 0.8, 0.1, 'sine');
                    }
                    
                    nextNoteTime = currentTime + note.duration;
                    currentNoteIndex = (currentNoteIndex + 1) % notes.length;
                }
                
                if (gameRunning) {
                    setTimeout(scheduleNote, 50);
                }
            }
            
            backgroundMusic = scheduleNote;
        }
        
        function startBackgroundMusic() {
            if (musicEnabled && audioContext && backgroundMusic) {
                backgroundMusic();
            }
        }
        
        function stopBackgroundMusic() {
            // 背景音樂會在 gameRunning = false 時自動停止
        }
        
        // 播放音調
        function playTone(frequency, duration, volume = 0.3, type = 'sine') {
            if (!audioContext || !soundEnabled) return;
            
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                oscillator.type = type;
                
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(volume, audioContext.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration);
            } catch (error) {
                console.log('音效播放錯誤:', error);
            }
        }
        
        // 播放不同的遊戲音效
        function playSound(type) {
            if (!soundEnabled) return;
            
            switch (type) {
                case 'shoot':
                    playTone(800, 0.1, 0.2, 'square');
                    break;
                case 'explosion':
                    playTone(150, 0.3, 0.3, 'sawtooth');
                    setTimeout(() => playTone(100, 0.2, 0.2, 'triangle'), 50);
                    break;
                case 'hit':
                    playTone(300, 0.2, 0.4, 'square');
                    break;
                case 'bee':
                    playTone(400, 0.1, 0.15, 'triangle');
                    break;
                case 'powerup':
                    playTone(523, 0.15, 0.3, 'sine');
                    setTimeout(() => playTone(659, 0.15, 0.3, 'sine'), 100);
                    setTimeout(() => playTone(784, 0.15, 0.3, 'sine'), 200);
                    break;
                case 'confirm':
                    playTone(660, 0.1, 0.2, 'sine');
                    break;
                case 'gameOver':
                    playTone(220, 0.5, 0.4, 'sawtooth');
                    setTimeout(() => playTone(196, 0.5, 0.4, 'sawtooth'), 250);
                    setTimeout(() => playTone(165, 1.0, 0.4, 'sawtooth'), 500);
                    break;
            }
        }
        
        // 震動效果
        function vibrate(pattern) {
            if (!vibrateEnabled || !navigator.vibrate) return;
            
            const patterns = {
                'shoot': [30],
                'hit': [100, 50, 100],
                'explosion': [200, 100, 200, 100, 200],
                'bee': [50, 30, 50],
                'gameOver': [500, 200, 500, 200, 1000]
            };
            
            const vibratePattern = patterns[pattern] || [50];
            navigator.vibrate(vibratePattern);
        }
        
        // 初始化遊戲
        function initGame() {
            console.log('初始化遊戲');
            score = 0;
            lives = 3;
            kills = 0;
            bullets = [];
            bees = [];
            enemyBullets = [];
            particles = [];
            player.x = canvas.width / 2;
            gameTime = 0;
            lastBeeSpawn = 0;
            lastShot = 0;
            gameStarted = false;
            gameRunning = false;
            updateUI();
            
            // 立即繪製初始畫面
            draw();
            console.log('初始畫面已繪製');
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('kills').textContent = kills;
        }
        
        async function startGame() {
            if (gameStarted) return;
            
            console.log('開始遊戲');
            
            // 啟用音效系統
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            gameRunning = true;
            gameStarted = true;
            document.getElementById('startHint').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            
            playSound('powerup');
            startBackgroundMusic();
            gameLoop();
        }
        
        function restartGame() {
            console.log('重新開始遊戲');
            initGame();
            startGame();
        }
        
        function setupTouchEvents() {
            console.log('設定觸控事件');
            
            function handleTouchStart(e) {
                e.preventDefault();
                console.log('觸控開始');
                
                if (!gameStarted) {
                    startGame();
                    return;
                }
                
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                touchX = touch.clientX - rect.left;
                lastTouchX = touchX;
                isTouch = true;
            }
            
            function handleTouchMove(e) {
                e.preventDefault();
                if (!gameRunning || !isTouch) return;
                
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                touchX = touch.clientX - rect.left;
            }
            
            function handleTouchEnd(e) {
                e.preventDefault();
                touchX = null;
                lastTouchX = null;
                isTouch = false;
            }
            
            function handleMouseDown(e) {
                console.log('滑鼠點擊');
                
                if (!gameStarted) {
                    startGame();
                    return;
                }
                
                const rect = canvas.getBoundingClientRect();
                touchX = e.clientX - rect.left;
                lastTouchX = touchX;
                isTouch = true;
            }
            
            function handleMouseMove(e) {
                if (!gameRunning || !isTouch) return;
                
                const rect = canvas.getBoundingClientRect();
                touchX = e.clientX - rect.left;
            }
            
            function handleMouseUp(e) {
                touchX = null;
                lastTouchX = null;
                isTouch = false;
            }
            
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            
            document.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });
        }
        
        function updatePlayer() {
            if (!gameRunning) return;
            
            if (touchX !== null && lastTouchX !== null) {
                const moveDistance = touchX - lastTouchX;
                player.x += moveDistance * 1.5;
                lastTouchX = touchX;
            }
            
            player.x = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, player.x));
        }
        
        function shootBullet() {
            if (Date.now() - lastShot > 200) {
                bullets.push({
                    x: player.x,
                    y: player.y - 10,
                    width: 4,
                    height: 10,
                    speed: 8
                });
                lastShot = Date.now();
                
                playSound('shoot');
                vibrate('shoot');
            }
        }
        
        function spawnBee() {
            if (!gameRunning) return;
            
            if (Date.now() - lastBeeSpawn > 1500 - Math.min(gameTime * 5, 1000)) {
                bees.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -30,
                    width: 30,
                    height: 25,
                    speed: 1 + Math.random() * 2,
                    lastShot: 0,
                    health: 1
                });
                lastBeeSpawn = Date.now();
                playSound('bee');
            }
        }
        
        function updateBees() {
            if (!gameRunning) return;
            
            for (let i = bees.length - 1; i >= 0; i--) {
                bees[i].y += bees[i].speed;
                
                if (Date.now() - bees[i].lastShot > 1000 + Math.random() * 2000) {
                    enemyBullets.push({
                        x: bees[i].x,
                        y: bees[i].y + 20,
                        width: 6,
                        height: 8,
                        speed: 3 + Math.random() * 2
                    });
                    bees[i].lastShot = Date.now();
                }
                
                if (bees[i].y > canvas.height) {
                    bees.splice(i, 1);
                }
            }
        }
        
        function updateBullets() {
            if (!gameRunning) return;
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }
            
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                enemyBullets[i].y += enemyBullets[i].speed;
                if (enemyBullets[i].y > canvas.height) {
                    enemyBullets.splice(i, 1);
                }
            }
        }
        
        function checkCollisions() {
            if (!gameRunning) return;
            
            // 玩家子彈擊中蜜蜂
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = bees.length - 1; j >= 0; j--) {
                    if (isColliding(bullets[i], bees[j])) {
                        createExplosion(bees[j].x, bees[j].y);
                        
                        bullets.splice(i, 1);
                        bees.splice(j, 1);
                        score += 10;
                        kills++;
                        
                        playSound('explosion');
                        vibrate('explosion');
                        
                        updateUI();
                        break;
                    }
                }
            }
            
            // 敵人子彈擊中玩家
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                if (isColliding(enemyBullets[i], player)) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    
                    playSound('hit');
                    vibrate('hit');
                    
                    updateUI();
                    
                    if (lives <= 0) {
                        endGame();
                        return;
                    }
                }
            }
            
            // 蜜蜂撞到玩家
            for (let i = bees.length - 1; i >= 0; i--) {
                if (isColliding(bees[i], player)) {
                    bees.splice(i, 1);
                    lives--;
                    
                    playSound('hit');
                    vibrate('hit');
                    
                    updateUI();
                    
                    if (lives <= 0) {
                        endGame();
                        return;
                    }
                }
            }
        }
        
        function isColliding(obj1, obj2) {
            return obj1.x < obj2.x + obj2.width &&
                   obj1.x + obj1.width > obj2.x &&
                   obj1.y < obj2.y + obj2.height &&
                   obj1.y + obj1.height > obj2.y;
        }
        
        function createExplosion(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: `hsl(${Math.random() * 60 + 10}, 100%, 50%)`
                });
            }
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        // 繪圖函數 - 重要修復
        function draw() {
            // 確保有效的繪圖上下文
            if (!ctx) {
                console.error('無法取得 canvas context');
                return;
            }
            
            // 清除整個畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 設置基本填充
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 繪製背景雲朵
            drawClouds();
            
            // 繪製玩家（總是顯示）
            drawPlayer();
            
            // 只有遊戲開始後才繪製其他物件
            if (gameStarted) {
                drawBullets();
                drawBees();
                drawEnemyBullets();
            }
            
            // 繪製粒子效果
            drawParticles();
        }
        
        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for (let i = 0; i < 3; i++) {
                const x = (gameTime * 0.2 + i * 150) % (canvas.width + 50) - 25;
                const y = 50 + i * 30;
                
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.arc(x + 20, y, 20, 0, Math.PI * 2);
                ctx.arc(x + 40, y, 15, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawPlayer() {
            // 確保玩家可見
            ctx.fillStyle = '#4169E1';
            ctx.fillRect(player.x - player.width/2, player.y - player.height/2, player.width, player.height);
            
            // 砲管
            ctx.fillStyle = '#191970';
            ctx.fillRect(player.x - 3, player.y - player.height/2 - 10, 6, 15);
            
            // 裝飾
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(player.x - player.width/2 + 5, player.y - 5, player.width - 10, 5);
            
            if (gameRunning) {
                shootBullet();
            }
        }
        
        function drawBullets() {
            ctx.fillStyle = '#FFD700';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x - bullet.width/2, bullet.y, bullet.width, bullet.height);
            });
        }
        
        function drawBees() {
            bees.forEach(bee => {
                // 蜜蜂身體
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(bee.x, bee.y, bee.width/2, bee.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 條紋
                ctx.fillStyle = '#000000';
                for (let i = 0; i < 3; i++) {
                    ctx.fillRect(bee.x - bee.width/2 + i * 8, bee.y - 3, 3, 6);
                }
                
                // 翅膀
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                const wingOffset = Math.sin(gameTime * 0.5) * 3;
                ctx.beginPath();
                ctx.ellipse(bee.x - 8, bee.y - 8 + wingOffset, 6, 10, -0.3, 0, Math.PI * 2);
                ctx.ellipse(bee.x + 8, bee.y - 8 - wingOffset, 6, 10, 0.3, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawEnemyBullets() {
            ctx.fillStyle = '#DC143C';
            enemyBullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.width/2, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawParticles() {
            particles.forEach(particle => {
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / 30;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function endGame() {
            gameRunning = false;
            gameStarted = false;
            
            playSound('gameOver');
            vibrate('gameOver');
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('gameOver').style.display = 'block';
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            gameTime++;
            
            updatePlayer();
            updateBees();
            updateBullets();
            updateParticles();
            spawnBee();
            checkCollisions();
            draw();
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 初始化
        window.addEventListener('load', () => {
            console.log('頁面載入完成');
            initAudioSystem();
            setupTouchEvents();
            initGame();
            
            // 強制繪製一次確保可見
            setTimeout(draw, 100);
        });
    </script>
</body>
</html>
