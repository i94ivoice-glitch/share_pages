<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐝 蜜蜂射擊大戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #87CEEB 0%, #98FB98 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            overflow: hidden;
        }
        
        .game-title {
            color: #2E8B57;
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-container {
            position: relative;
            border: 4px solid #228B22;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #87CEEB;
        }
        
        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%);
            touch-action: none;
        }
        
        .score-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            font-weight: bold;
            font-size: 1.2em;
            color: #2E8B57;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            pointer-events: none;
        }
        
        .start-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 150;
            border: 3px solid #228B22;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            color: #2E8B57;
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            border: 3px solid #228B22;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        .game-over h2 {
            color: #DC143C;
            margin-bottom: 15px;
            font-size: 2em;
        }
        
        .game-over p {
            color: #2E8B57;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        
        .btn {
            background: linear-gradient(145deg, #32CD32, #228B22);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #228B22, #32CD32);
        }
        
        .controls {
            margin-top: 15px;
            color: #2E8B57;
            text-align: center;
            font-size: 1.1em;
        }
        
        @media (max-width: 600px) {
            .game-title {
                font-size: 2em;
                margin: 10px 0;
            }
            
            .controls {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <h1 class="game-title">🐝 蜜蜂射擊大戰 🎯</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="score-panel">
            <div>💯 分數: <span id="score">0</span></div>
            <div>❤️ 生命: <span id="lives">3</span></div>
            <div>🎯 擊殺: <span id="kills">0</span></div>
        </div>
        
        <div class="start-hint" id="startHint">
            🎮 觸摸螢幕開始遊戲<br>
            👆 滑動控制發射器移動
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>🎮 遊戲結束！</h2>
            <p>最終分數: <span id="finalScore">0</span></p>
            <p>擊殺數: <span id="finalKills">0</span></p>
            <button class="btn" onclick="restartGame()">🚀 重新開始</button>
        </div>
    </div>
    
    <div class="controls">
        📱 用手指滑動控制發射器 • 🎯 躲避蜜蜂炸彈 • 💥 反擊得分
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 遊戲狀態
        let gameRunning = false;
        let gameStarted = false;
        let score = 0;
        let lives = 3;
        let kills = 0;
        let animationId;
        
        // 遊戲物件
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            width: 40,
            height: 30,
            speed: 5
        };
        
        let bullets = [];
        let bees = [];
        let enemyBullets = [];
        let particles = [];
        
        // 觸控控制
        let touchX = null;
        let lastTouchX = null;
        let isTouch = false;
        
        // 遊戲計時
        let lastBeeSpawn = 0;
        let lastShot = 0;
        let gameTime = 0;
        
        // 初始化遊戲
        function initGame() {
            score = 0;
            lives = 3;
            kills = 0;
            bullets = [];
            bees = [];
            enemyBullets = [];
            particles = [];
            player.x = canvas.width / 2;
            gameTime = 0;
            lastBeeSpawn = 0;
            lastShot = 0;
            gameStarted = false;
            updateUI();
            draw(); // 繪製初始畫面
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('kills').textContent = kills;
        }
        
        function startGame() {
            if (gameStarted) return;
            
            gameRunning = true;
            gameStarted = true;
            document.getElementById('startHint').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            
            gameLoop();
        }
        
        function restartGame() {
            initGame();
            startGame();
        }
        
        // 觸控事件處理 - 改進版
        function setupTouchEvents() {
            // 觸控開始
            function handleTouchStart(e) {
                e.preventDefault();
                if (!gameStarted) {
                    startGame();
                    return;
                }
                
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                touchX = touch.clientX - rect.left;
                lastTouchX = touchX;
                isTouch = true;
            }
            
            // 觸控移動
            function handleTouchMove(e) {
                e.preventDefault();
                if (!gameRunning || !isTouch) return;
                
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                touchX = touch.clientX - rect.left;
            }
            
            // 觸控結束
            function handleTouchEnd(e) {
                e.preventDefault();
                touchX = null;
                lastTouchX = null;
                isTouch = false;
            }
            
            // 滑鼠事件（桌面測試用）
            function handleMouseDown(e) {
                if (!gameStarted) {
                    startGame();
                    return;
                }
                
                const rect = canvas.getBoundingClientRect();
                touchX = e.clientX - rect.left;
                lastTouchX = touchX;
                isTouch = true;
            }
            
            function handleMouseMove(e) {
                if (!gameRunning || !isTouch) return;
                
                const rect = canvas.getBoundingClientRect();
                touchX = e.clientX - rect.left;
            }
            
            function handleMouseUp(e) {
                touchX = null;
                lastTouchX = null;
                isTouch = false;
            }
            
            // 綁定事件
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            
            // 防止頁面滾動
            document.addEventListener('touchmove', (e) => {
                e.preventDefault();
            }, { passive: false });
        }
        
        function updatePlayer() {
            if (!gameRunning) return;
            
            if (touchX !== null && lastTouchX !== null) {
                const moveDistance = touchX - lastTouchX;
                player.x += moveDistance * 1.5; // 提高敏感度
                lastTouchX = touchX;
            }
            
            // 限制玩家在畫布範圍內
            player.x = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, player.x));
        }
        
        function shootBullet() {
            if (Date.now() - lastShot > 200) { // 限制射擊頻率
                bullets.push({
                    x: player.x,
                    y: player.y - 10,
                    width: 4,
                    height: 10,
                    speed: 8
                });
                lastShot = Date.now();
            }
        }
        
        function spawnBee() {
            if (!gameRunning) return;
            
            if (Date.now() - lastBeeSpawn > 1500 - Math.min(gameTime * 5, 1000)) {
                bees.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -30,
                    width: 30,
                    height: 25,
                    speed: 1 + Math.random() * 2,
                    lastShot: 0,
                    health: 1
                });
                lastBeeSpawn = Date.now();
            }
        }
        
        function updateBees() {
            if (!gameRunning) return;
            
            for (let i = bees.length - 1; i >= 0; i--) {
                bees[i].y += bees[i].speed;
                
                // 蜜蜂射擊
                if (Date.now() - bees[i].lastShot > 1000 + Math.random() * 2000) {
                    enemyBullets.push({
                        x: bees[i].x,
                        y: bees[i].y + 20,
                        width: 6,
                        height: 8,
                        speed: 3 + Math.random() * 2
                    });
                    bees[i].lastShot = Date.now();
                }
                
                // 移除超出邊界的蜜蜂
                if (bees[i].y > canvas.height) {
                    bees.splice(i, 1);
                }
            }
        }
        
        function updateBullets() {
            if (!gameRunning) return;
            
            // 玩家子彈
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }
            
            // 敵人子彈
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                enemyBullets[i].y += enemyBullets[i].speed;
                if (enemyBullets[i].y > canvas.height) {
                    enemyBullets.splice(i, 1);
                }
            }
        }
        
        function checkCollisions() {
            if (!gameRunning) return;
            
            // 玩家子彈擊中蜜蜂
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = bees.length - 1; j >= 0; j--) {
                    if (isColliding(bullets[i], bees[j])) {
                        // 創建爆炸效果
                        createExplosion(bees[j].x, bees[j].y);
                        
                        bullets.splice(i, 1);
                        bees.splice(j, 1);
                        score += 10;
                        kills++;
                        
                        // 震動回饋
                        if (navigator.vibrate) {
                            navigator.vibrate(100);
                        }
                        
                        updateUI();
                        break;
                    }
                }
            }
            
            // 敵人子彈擊中玩家
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                if (isColliding(enemyBullets[i], player)) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    
                    // 強震動回饋
                    if (navigator.vibrate) {
                        navigator.vibrate([200, 100, 200]);
                    }
                    
                    updateUI();
                    
                    if (lives <= 0) {
                        endGame();
                        return;
                    }
                }
            }
            
            // 蜜蜂撞到玩家
            for (let i = bees.length - 1; i >= 0; i--) {
                if (isColliding(bees[i], player)) {
                    bees.splice(i, 1);
                    lives--;
                    
                    // 超強震動
                    if (navigator.vibrate) {
                        navigator.vibrate([300, 100, 300, 100, 300]);
                    }
                    
                    updateUI();
                    
                    if (lives <= 0) {
                        endGame();
                        return;
                    }
                }
            }
        }
        
        function isColliding(obj1, obj2) {
            return obj1.x < obj2.x + obj2.width &&
                   obj1.x + obj1.width > obj2.x &&
                   obj1.y < obj2.y + obj2.height &&
                   obj1.y + obj1.height > obj2.y;
        }
        
        function createExplosion(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: `hsl(${Math.random() * 60 + 10}, 100%, 50%)`
                });
            }
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function draw() {
            // 清除畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 繪製背景雲朵
            drawClouds();
            
            // 只有遊戲開始後才繪製遊戲物件
            if (gameStarted) {
                // 繪製玩家
                drawPlayer();
                
                // 繪製子彈
                drawBullets();
                
                // 繪製蜜蜂
                drawBees();
                
                // 繪製敵人子彈
                drawEnemyBullets();
            } else {
                // 未開始時顯示玩家發射器
                drawPlayer();
            }
            
            // 繪製粒子效果
            drawParticles();
        }
        
        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for (let i = 0; i < 3; i++) {
                const x = (gameTime * 0.2 + i * 150) % (canvas.width + 50) - 25;
                const y = 50 + i * 30;
                
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.arc(x + 20, y, 20, 0, Math.PI * 2);
                ctx.arc(x + 40, y, 15, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawPlayer() {
            // 繪製發射器主體
            ctx.fillStyle = '#4169E1';
            ctx.fillRect(player.x - player.width/2, player.y - player.height/2, player.width, player.height);
            
            // 繪製發射器砲管
            ctx.fillStyle = '#191970';
            ctx.fillRect(player.x - 3, player.y - player.height/2 - 10, 6, 15);
            
            // 繪製發射器裝飾
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(player.x - player.width/2 + 5, player.y - 5, player.width - 10, 5);
            
            // 自動射擊（僅遊戲運行時）
            if (gameRunning) {
                shootBullet();
            }
        }
        
        function drawBullets() {
            ctx.fillStyle = '#FFD700';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x - bullet.width/2, bullet.y, bullet.width, bullet.height);
                
                // 子彈光效
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 5;
                ctx.fillRect(bullet.x - bullet.width/2, bullet.y, bullet.width, bullet.height);
                ctx.shadowBlur = 0;
            });
        }
        
        function drawBees() {
            bees.forEach(bee => {
                // 蜜蜂身體
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(bee.x, bee.y, bee.width/2, bee.height/2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 蜜蜂條紋
                ctx.fillStyle = '#000000';
                for (let i = 0; i < 3; i++) {
                    ctx.fillRect(bee.x - bee.width/2 + i * 8, bee.y - 3, 3, 6);
                }
                
                // 蜜蜂翅膀（動畫）
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                const wingOffset = Math.sin(gameTime * 0.5) * 3;
                ctx.beginPath();
                ctx.ellipse(bee.x - 8, bee.y - 8 + wingOffset, 6, 10, -0.3, 0, Math.PI * 2);
                ctx.ellipse(bee.x + 8, bee.y - 8 - wingOffset, 6, 10, 0.3, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawEnemyBullets() {
            ctx.fillStyle = '#DC143C';
            enemyBullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, bullet.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                // 敵人子彈光效
                ctx.shadowColor = '#DC143C';
                ctx.shadowBlur = 3;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }
        
        function drawParticles() {
            particles.forEach(particle => {
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / 30;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function endGame() {
            gameRunning = false;
            gameStarted = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('gameOver').style.display = 'block';
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            gameTime++;
            
            updatePlayer();
            updateBees();
            updateBullets();
            updateParticles();
            spawnBee();
            checkCollisions();
            draw();
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 初始化
        window.addEventListener('load', () => {
            setupTouchEvents();
            initGame();
        });
    </script>
</body>
</html>
